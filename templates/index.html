<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Chat</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sb-hd">
      <h1><span>⚡</span> LLM Chat</h1>
      <button class="col-btn" onclick="toggleSB()" title="收起">◀</button>
    </div>
    <div class="sb-sec">
      <h3>后端</h3>
      <select class="m-sel" id="bk-sel" onchange="switchBackend(this.value)">
        <option value="llama-cpp">llama-cpp</option>
        <option value="ollama">Ollama</option>
      </select>
    </div>
    <div class="sb-sec">
      <h3>模型</h3>
      <select class="m-sel" id="m-sel" onchange="selModel(this.value)">
        <option value="">选择模型...</option>
      </select>
    </div>
    <div class="sb-sec">
      <h3>导航</h3>
      <div class="nav act" data-n="chat" onclick="nav('chat')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        对话
      </div>
      <div class="nav" data-n="translate" onclick="nav('translate')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        翻译
      </div>
      <div class="nav" data-n="templates" onclick="nav('templates')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        模板
      </div>
      <div class="nav" data-n="settings" onclick="nav('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"/></svg>
        设置
      </div>
    </div>
    <div style="flex:1"></div>
    <div class="st-row">
      <div class="st-dot" id="st-dot"></div>
      <span id="st-txt">检测中...</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="top">
      <button class="exp-btn" onclick="toggleSB()">☰</button>
      <span class="ttl" id="pg-ttl">对话</span>
      <span class="spc"></span>
      <div class="m-badge"><div class="d"></div><span id="cur-m">未选择</span></div>
      <button class="i-btn" onclick="nav('settings')" title="设置">⚙️</button>
    </div>

    <!-- Chat -->
    <div class="panel act" id="p-chat">
      <div class="msgs" id="msgs">
        <div class="empty" id="empty">
          <h2>开始对话</h2>
          <p>选择模型后输入消息，或拖入文件</p>
        </div>
      </div>
      <div class="atchs hid" id="atchs"></div>
      <div class="in-area">
        <div class="in-wrap" id="dz">
          <select id="tpl-sel" style="padding:8px 12px;border-radius:8px;background:var(--input);color:var(--text);font-size:14px;flex-shrink:0">
            <option value="">普通对话</option>
          </select>
          <textarea id="inp" placeholder="输入消息，Shift+Enter 换行..." rows="1" onkeydown="onKey(event)" oninput="ar(this)"></textarea>
          <div class="in-acts">
            <button class="abtn" onclick="document.getElementById('fi').click()" title="附件">📎</button>
            <button class="abtn" onclick="webSearch()" title="Web搜索">🔍</button>
          <button class="sbtn" id="sbtn" onclick="send()">↑</button>
          </div>
        </div>
        <input type="file" id="fi" accept="image/*,.txt,.srt,.vtt,.ass,.ssa,.sub,.py,.json,.cpp,.html,.js" multiple hidden onchange="hFiles(this)">
      </div>
    </div>

    <!-- Translate -->
    <div class="panel" id="p-translate">
      <div class="tr-panel">
        <div class="tr-hd">
          <select id="sl"><option value="auto">自动</option><option value="ja">日语</option><option value="ko">韩语</option><option value="zh">中文</option><option value="en">英语</option></select>
          <span class="ar">→</span>
          <select id="tl"><option value="zh" selected>中文</option><option value="en">英语</option><option value="ja">日语</option><option value="ko">韩语</option></select>
          <span style="flex:1"></span>
          <button class="btn pri" onclick="doTr()">翻译</button>
          <button class="btn" onclick="clrTr()">清空</button>
        </div>
        <div class="tr-bd">
          <div class="tr-box"><label>原文</label><textarea id="st" placeholder="输入待翻译文本..."></textarea></div>
          <div class="tr-box"><label>译文</label><textarea id="to" readonly placeholder="翻译结果..."></textarea></div>
        </div>
      </div>
    </div>

    <!-- Templates -->
    <div class="panel" id="p-templates">
      <div class="tpl-panel">
        <div class="tpl-list">
          <h3>模板 <button onclick="newTpl()">+ 新建</button></h3>
          <div id="tl-list"></div>
        </div>
        <div class="tpl-ed" id="tpl-ed">
          <p style="color:var(--muted);text-align:center;margin-top:80px">选择模板进行编辑，或新建模板</p>
        </div>
      </div>
    </div>

    <!-- Settings -->
    <div class="panel" id="p-settings">
      <div class="set-panel">
        <div class="set-sec">
          <h2>推理参数</h2>
          <div class="s-row"><label>Temperature</label><input type="range" id="s-temp" min="0" max="2" step=".1" value=".7" oninput="us('temp')"><span class="s-val" id="v-temp">0.7</span></div>
          <div class="s-row"><label>Max Tokens</label><input type="range" id="s-max" min="256" max="8192" step="256" value="4096" oninput="us('max')"><span class="s-val" id="v-max">4096</span></div>
          <div class="s-row"><label>Top P</label><input type="range" id="s-topp" min="0" max="1" step=".05" value=".9" oninput="us('topp')"><span class="s-val" id="v-topp">0.9</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
